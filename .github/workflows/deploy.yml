name: Deploy to Cloud VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy — Cloud VPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/greenhouse-backend:latest,${{ secrets.DOCKERHUB_USERNAME }}/greenhouse-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/greenhouse-frontend:latest,${{ secrets.DOCKERHUB_USERNAME }}/greenhouse-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/greenhouse-saas

            # Pull latest images
            docker compose -f docker-compose.cloud.yml pull

            # Run database migrations
            docker compose -f docker-compose.cloud.yml run --rm backend python manage.py migrate --noinput

            # Collect static files
            docker compose -f docker-compose.cloud.yml run --rm backend python manage.py collectstatic --noinput

            # Rolling restart (zero-downtime)
            docker compose -f docker-compose.cloud.yml up -d --no-deps --scale backend=2 backend
            sleep 15
            docker compose -f docker-compose.cloud.yml up -d --no-deps --scale backend=1 backend

            # Restart other services
            docker compose -f docker-compose.cloud.yml up -d --no-deps celery-worker celery-beat nginx

            # Health check
            sleep 10
            curl -f http://localhost/api/health/ || (echo "Health check failed" && exit 1)

            echo "Deployment successful: ${{ github.sha }}"

      - name: Notify deployment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment?.id || 0,
              state: 'success',
              description: 'Deployed to production',
              environment_url: 'https://${{ secrets.VPS_HOST }}'
            }).catch(() => {})

  e2e-smoke:
    name: E2E Smoke Test (post-deploy)
    runs-on: ubuntu-latest
    needs: deploy
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: npm ci && npx playwright install --with-deps
        working-directory: frontend

      - name: Run smoke tests against production
        run: npx playwright test --project=chromium e2e/smoke.spec.ts
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: https://${{ secrets.VPS_HOST }}
          PLAYWRIGHT_DEMO_EMAIL: demo@greenhouse-saas.com
          PLAYWRIGHT_DEMO_PASSWORD: demo1234
