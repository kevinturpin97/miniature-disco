[env:heltec_wifi_lora_32_V2]
platform = espressif32
board = heltec_wifi_lora_32_V2
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    sandeepmistry/LoRa@^0.8.0

; ── Alternative boards ────────────────────────────────────────────────────
; TTGO LoRa32 V1 / V2 → same LoRa pins, replace board with:
;   board = ttgo-lora32-v1
; Bare ESP32 + SX1278 wired via SPI → replace board with:
;   board = esp32dev
; then adjust pin defines in main.cpp
