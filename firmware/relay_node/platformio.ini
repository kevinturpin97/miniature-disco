; ────────────────────────────────────────────────────────────────
; PlatformIO configuration — Greenhouse Relay Node
; ────────────────────────────────────────────────────────────────

[platformio]
default_envs = relay_node

; ── Hardware target: Arduino Nano (ATmega328P) ──────────────────
[env:relay_node]
platform  = atmelavr
board     = nanoatmega328
framework = arduino
lib_deps  =
    sandeepmistry/LoRa@^0.8.0
    paulstoffregen/OneWire@^2.3
    milesburton/DallasTemperature@^3.11
    adafruit/DHT sensor library@^1.4
monitor_speed = 115200
upload_speed  = 115200
build_flags   = -std=c++17 -Os

; ── Native environment for unit tests (no hardware needed) ──────
[env:native_test]
platform = native
build_flags = -std=c++17
test_build_src = false
