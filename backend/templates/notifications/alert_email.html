<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; background: #f4f4f5; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .card { background: #fff; border-radius: 8px; padding: 24px; border: 1px solid #e4e4e7; }
    .header { text-align: center; padding-bottom: 16px; border-bottom: 1px solid #e4e4e7; margin-bottom: 16px; }
    .header h1 { margin: 0; font-size: 20px; color: #18181b; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
    .badge-critical { background: #fef2f2; color: #dc2626; }
    .badge-warning { background: #fffbeb; color: #d97706; }
    .badge-info { background: #eff6ff; color: #2563eb; }
    .detail { margin: 8px 0; color: #52525b; font-size: 14px; }
    .detail strong { color: #18181b; }
    .footer { text-align: center; margin-top: 16px; font-size: 12px; color: #a1a1aa; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <h1>Greenhouse Alert</h1>
      </div>
      <p>
        <span class="badge badge-{{ severity|lower }}">{{ severity }}</span>
        <span class="badge">{{ alert_type }}</span>
      </p>
      <div class="detail"><strong>Zone:</strong> {{ zone_name }} ({{ greenhouse_name }})</div>
      <div class="detail"><strong>Message:</strong> {{ message }}</div>
      {% if value %}<div class="detail"><strong>Value:</strong> {{ value }}</div>{% endif %}
      <div class="detail"><strong>Time:</strong> {{ created_at }}</div>
    </div>
    <div class="footer">
      <p>{{ organization_name }} &mdash; Greenhouse SaaS</p>
    </div>
  </div>
</body>
</html>
